<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | AI Education Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
--primary:#2563eb;
--secondary:#10b981;
--dark:#111827;
}

body{
font-family:'Segoe UI',sans-serif;
min-height:100vh;
background:linear-gradient(135deg,#2563eb,#10b981);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.register-card{
width:100%;
max-width:650px;
background:rgba(255,255,255,0.96);
backdrop-filter:blur(10px);
border-radius:20px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo i{
font-size:60px;
color:#2563eb;
}

.logo h2{
font-weight:700;
margin-top:10px;
}

.form-control,
.form-select{
padding:12px;
border-radius:10px;
}

.btn-register{
background:#10b981;
color:white;
padding:12px;
border:none;
border-radius:10px;
font-weight:600;
}

.btn-register:hover{
background:#0d966d;
color:white;
}

.password-strength{
height:8px;
background:#e5e7eb;
border-radius:5px;
overflow:hidden;
margin-top:8px;
}

.password-bar{
width:60%;
height:100%;
background:#10b981;
}

.login-link{
text-align:center;
margin-top:15px;
}

.login-link a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="register-card">

<div class="logo">

<i class="fas fa-user-graduate"></i>

<h2>AI Education Platform</h2>

<p>Create Your Account</p>

</div>

<form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">

<div class="row">

<div class="col-md-6 mb-3">

<label>Full Name</label>

<input type="text"
class="form-control"
placeholder="Enter Full Name">

</div>

<div class="col-md-6 mb-3">

<label>Email Address</label>

<input type="email"
class="form-control"
placeholder="Enter Email">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input type="tel"
class="form-control"
placeholder="Enter Phone Number">

</div>

<div class="col-md-6 mb-3">

<label>Select Role</label>

<select class="form-select">

<option>Student</option>
<option>Teacher</option>
<option>Parent</option>

</select>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Password</label>

<input type="password"
class="form-control"
placeholder="Create Password">
</div>

<div class="col-md-6 mb-3">

<label>Confirm Password</label>

<input type="password"
class="form-control"
placeholder="Confirm Password">

</div>

</div>
<div class="mb-3">

<label>Address</label>

<textarea
class="form-control"
rows="3"
placeholder="Enter Address"></textarea>

</div>

<div class="form-check mb-3">

<input class="form-check-input"
type="checkbox"
id="terms">

<label class="form-check-label" for="terms">

I agree to the Terms & Conditions
and Privacy Policy

</label>

</div>

<button type="submit"
class="btn btn-register w-100">

Create Account

</button>

</form>

<hr>

<div class="login-link">

<p>

Already have an account?

<a href="login.html">
Login Here
</a>

</p>

<p>

<a href="index.html">
← Back to Home
</a>

</p>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
