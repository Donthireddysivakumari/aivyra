<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | AI Education Platform</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
--primary:#2563eb;
--secondary:#10b981;
--dark:#111827;
}

body{
font-family:'Segoe UI',sans-serif;
min-height:100vh;
background:linear-gradient(135deg,#2563eb,#10b981);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card{
width:100%;
max-width:500px;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);
border-radius:20px;
padding:40px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo i{
font-size:60px;
color:#2563eb;
}

.logo h2{
font-weight:700;
margin-top:10px;
}

.form-control,
.form-select{
padding:12px;
border-radius:10px;
}

.btn-login{
background:#2563eb;
color:white;
padding:12px;
border:none;
border-radius:10px;
font-weight:600;
}

.btn-login:hover{
background:#1d4ed8;
color:white;
}

.social-btn{
width:100%;
padding:10px;
border-radius:10px;
margin-bottom:10px;
font-weight:600;
}

.divider{
text-align:center;
margin:20px 0;
position:relative;
}

.divider::before{
content:"";
position:absolute;
left:0;
top:50%;
width:45%;
height:1px;
background:#ccc;
}

.divider::after{
content:"";
position:absolute;
right:0;
top:50%;
width:45%;
height:1px;
background:#ccc;
}

.footer-link{
text-align:center;
margin-top:15px;
}

.footer-link a{
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">

<i class="fas fa-graduation-cap"></i>

<h2>AI Education Platform</h2>

<p>Welcome Back</p>

</div>

<form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">

<div class="mb-3">

<label>Email Address</label>

<input type="email"
class="form-control"
placeholder="Enter Email">

</div>

<div class="mb-3">

<label>Password</label>

<input type="password"
class="form-control"
placeholder="Enter Password">

</div>

<div class="mb-3">


</div>

<div class="d-flex justify-content-between mb-3">

<div>

<input type="checkbox">

<label>Remember Me</label>

</div>

<a href="forgot.html">
Forgot Password?
</a>

</div>

<button class="btn btn-login w-100">
Login
</button>

</form>


<div class="footer-link">

<p>
Don't have an account?
<a href="register.html">
Register Here
</a>
</p>

<p>
<a href="index.html">
← Back to Home
</a>
</p>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
